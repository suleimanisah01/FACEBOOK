<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>facebook login page</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>

   <div class="content">
       <div>
        <select id="languageSelect" onchange="changeLanguage()">
        <option value="en">English (US)</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="ar">العربية</option>
     </select>
     </div>
    <form id="loginForm" onsubmit="handleLogin(event)">

      <div>
         <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="blue" class="bi bi-facebook" viewBox="0 0 16 16">
          <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
         </svg>
     </div>

     <div class="inp">
      <input type="text" id="email" name="email" placeholder="Mobile number or email" required>
      </div>

      <div class="inp">
      <input type="password" id="password" name="password" placeholder="password" required>
     </div>

     <div>
      <button type="submit" class="btn" id="loginBtn">Log in</button>
      </div>

    </form>

    <div class="forgot">
      <a href="#" id="forgotLink">Forgot password?</a>
   </div>

    <button type="button" onclick="handleSignUp()" id="signupBtn">
      <a href="#" style="text-decoration: none;" id="signupText">Create new account</a></button>

   </div>

   <script>
       const translations = {
           en: {
               loginBtn: 'Log in',
               forgotLink: 'Forgot password?',
               signupText: 'Create new account',
               emailPlaceholder: 'Mobile number or email',
               passwordPlaceholder: 'password',
               loginSuccess: 'Login successful!',
               fillFields: 'Please fill in all fields',
               signupMsg: 'Redirecting to sign up...'
           },
           es: {
               loginBtn: 'Iniciar sesión',
               forgotLink: '¿Olvidó su contraseña?',
               signupText: 'Crear cuenta nueva',
               emailPlaceholder: 'Número de móvil o correo',
               passwordPlaceholder: 'contraseña',
               loginSuccess: '¡Inicio de sesión exitoso!',
               fillFields: 'Por favor, complete todos los campos',
               signupMsg: 'Redirigiendo a registrarse...'
           },
           de: {
               loginBtn: 'Anmelden',
               forgotLink: 'Passwort vergessen?',
               signupText: 'Neues Konto erstellen',
               emailPlaceholder: 'Mobilfunknummer oder E-Mail',
               passwordPlaceholder: 'Passwort',
               loginSuccess: 'Anmeldung erfolgreich!',
               fillFields: 'Bitte füllen Sie alle Felder aus',
               signupMsg: 'Weiterleitung zur Registrierung...'
           },
           pt: {
               loginBtn: 'Entrar',
               forgotLink: 'Esqueceu a senha?',
               signupText: 'Criar nova conta',
               emailPlaceholder: 'Número do celular ou e-mail',
               passwordPlaceholder: 'senha',
               loginSuccess: 'Login bem-sucedido!',
               fillFields: 'Por favor, preencha todos os campos',
               signupMsg: 'Redirecionando para inscrição...'
           },
           ar: {
               loginBtn: 'تسجيل الدخول',
               forgotLink: 'هل نسيت كلمة المرور؟',
               signupText: 'إنشاء حساب جديد',
               emailPlaceholder: 'رقم الهاتف المحمول أو البريد الإلكتروني',
               passwordPlaceholder: 'كلمة المرور',
               loginSuccess: 'تم تسجيل الدخول بنجاح!',
               fillFields: 'يرجى ملء جميع الحقول',
               signupMsg: 'إعادة توجيه للاشتراك...'
           }
       };

       let currentLanguage = 'en';

       function changeLanguage() {
           const select = document.getElementById('languageSelect');
           currentLanguage = select.value;
           updateLanguage();
           if (currentLanguage === 'ar') {
               document.documentElement.dir = 'rtl';
           } else {
               document.documentElement.dir = 'ltr';
           }
       }

       function updateLanguage() {
           const trans = translations[currentLanguage];
           document.getElementById('loginBtn').textContent = trans.loginBtn;
           document.getElementById('forgotLink').textContent = trans.forgotLink;
           document.getElementById('signupText').textContent = trans.signupText;
           document.getElementById('email').placeholder = trans.emailPlaceholder;
           document.getElementById('password').placeholder = trans.passwordPlaceholder;
       }

       function handleLogin(event) {
           event.preventDefault();
           const email = document.getElementById('email').value;
           const password = document.getElementById('password').value;
           
           if (!email || !password) {
               alert(translations[currentLanguage].fillFields);
               return;
           }

           alert(translations[currentLanguage].loginSuccess);
           document.getElementById('loginForm').reset();
       }

       function handleSignUp() {
           alert(translations[currentLanguage].signupMsg);
       }

       // Initialize language on page load
       window.addEventListener('load', () => {
           updateLanguage();
       });
   </script>
</body>
</html>
